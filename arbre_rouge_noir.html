<!DOCTYPE html>
<html lang="fr" class="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Arbre Rouge-Noir - Animation MP2I</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            darkMode: 'class',
            theme: {
                extend: {
                    fontFamily: {
                        mono: ['Courier New', 'Consolas', 'Monaco', 'monospace'],
                    }
                }
            }
        }
    </script>
    <style>
        body { background-color: #020617; overflow: hidden; }
        #canvas-container { position: relative; width: 100vw; height: 100vh; }
        canvas { display: block; width: 100%; height: 100%; touch-action: none; }
        
        #ui-panel {
            position: absolute;
            top: 20px;
            left: 20px;
            background: rgba(15, 23, 42, 0.9);
            backdrop-filter: blur(8px);
            padding: 20px;
            border-radius: 12px;
            box-shadow: 0 4px 20px rgba(0, 0, 0, 0.5);
            width: 350px;
            border: 1px solid #334155;
            display: flex;
            flex-direction: column;
            z-index: 50;
        }

        #log-panel {
            position: absolute;
            top: 20px;
            right: 20px;
            background: rgba(2, 6, 23, 0.95);
            backdrop-filter: blur(8px);
            padding: 16px;
            border-radius: 12px;
            box-shadow: 0 4px 20px rgba(0, 0, 0, 0.5);
            width: 320px;
            height: 300px;
            border: 1px solid #334155;
            display: flex;
            flex-direction: column;
            z-index: 50;
        }

        .log-entry {
            animation: slideIn 0.3s ease-out;
            margin-bottom: 8px;
            padding-bottom: 8px;
            border-bottom: 1px dashed #334155;
        }
        
        @keyframes slideIn {
            from { opacity: 0; transform: translateX(20px); }
            to { opacity: 1; transform: translateX(0); }
        }

        /* Custom scrollbar */
        .custom-scroll::-webkit-scrollbar { width: 6px; }
        .custom-scroll::-webkit-scrollbar-track { background: transparent; }
        .custom-scroll::-webkit-scrollbar-thumb { background-color: #475569; border-radius: 10px; }
    </style>
</head>
<body class="text-slate-300 font-sans selection:bg-emerald-500/30 selection:text-emerald-200">

<div id="canvas-container">
    <canvas id="treeCanvas"></canvas>
    
    <!-- Panneau de contrôle (Gauche) -->
    <div id="ui-panel">
        <div class="flex items-center justify-between mb-4">
            <h1 class="text-lg font-bold text-white font-mono flex items-center">
                <span class="text-red-500 mr-2">●</span> Arbre Rouge-Noir
            </h1>
            <a href="informatique.html" class="text-xs text-emerald-500 hover:text-emerald-400 border border-emerald-900 px-2 py-1 rounded bg-emerald-950/30 transition-colors">← Retour</a>
        </div>
        
        <p class="text-xs text-slate-400 mb-4 pb-4 border-b border-slate-700">
            Un arbre binaire de recherche auto-équilibré. Les règles garantissent que le chemin le plus long n'est pas plus de 2x plus grand que le plus court.
        </p>

        <div class="space-y-4">
            <!-- Contrôle d'insertion -->
            <div>
                <label class="block text-xs font-bold text-slate-400 uppercase tracking-wider mb-2">Valeur à insérer</label>
                <div class="flex space-x-2">
                    <input type="number" id="val-input" placeholder="Ex: 42" class="w-full bg-slate-900 border border-slate-700 text-white rounded px-3 py-2 text-sm focus:outline-none focus:border-emerald-500 focus:ring-1 focus:ring-emerald-500" onkeypress="if(event.key === 'Enter') insertManual()">
                    <button onclick="insertManual()" id="btn-insert" class="bg-emerald-600 hover:bg-emerald-500 text-white px-4 py-2 rounded text-sm font-bold transition-colors shadow-lg shadow-emerald-900/20">+</button>
                </div>
            </div>

            <!-- Boutons d'action -->
            <div class="grid grid-cols-2 gap-2">
                <button onclick="insertRandom()" id="btn-random" class="bg-slate-800 hover:bg-slate-700 border border-slate-600 text-slate-200 px-3 py-2 rounded text-xs font-semibold transition-colors">
                    + Aléatoire
                </button>
                <button onclick="resetTree()" id="btn-reset" class="bg-red-950/40 hover:bg-red-900/60 border border-red-900 text-red-400 px-3 py-2 rounded text-xs font-semibold transition-colors">
                    Effacer l'arbre
                </button>
            </div>

            <!-- Vitesse -->
            <div class="pt-2 border-t border-slate-700">
                <label class="flex justify-between text-xs font-bold text-slate-400 uppercase tracking-wider mb-2">
                    <span>Vitesse d'animation</span>
                </label>
                <input type="range" id="slider-speed" min="1" max="10" value="6" class="w-full accent-emerald-500">
                <div class="flex justify-between text-[10px] text-slate-500 mt-1">
                    <span>Lente</span>
                    <span>Rapide</span>
                </div>
            </div>
        </div>
    </div>

    <!-- Journal d'exécution (Droite) -->
    <div id="log-panel">
        <h2 class="text-xs font-bold text-slate-400 uppercase tracking-wider mb-3 flex items-center border-b border-slate-700 pb-2">
            <svg class="w-4 h-4 mr-2" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M8 9l3 3-3 3m5 0h3M4 15h1m1 0h1m-7 0a2 2 0 002 2h10a2 2 0 002-2v-6a2 2 0 00-2-2H6a2 2 0 00-2 2v6z"></path></svg>
            Journal d'exécution
        </h2>
        <div id="log-container" class="flex-grow overflow-y-auto custom-scroll text-sm font-mono flex flex-col-reverse">
            <!-- Les logs apparaissent ici (flex-col-reverse permet de garder le dernier en bas) -->
        </div>
    </div>
</div>

<script>
    // --- Configuration Canvas & Animation ---
    const canvas = document.getElementById('treeCanvas');
    const ctx = canvas.getContext('2d');
    let width, height;
    
    // Paramètres UI
    const sliderSpeed = document.getElementById('slider-speed');
    const inputVal = document.getElementById('val-input');
    const btnInsert = document.getElementById('btn-insert');
    const btnRandom = document.getElementById('btn-random');
    const logContainer = document.getElementById('log-container');

    let isAnimating = false;
    let baseDelay = 600; // ms
    let highlightedNode = null;

    // --- Structures de Données (Arbre Rouge-Noir) ---
    const RED = 'red';
    const BLACK = 'black';

    class Node {
        constructor(value) {
            this.value = value;
            this.color = RED;
            this.left = null;
            this.right = null;
            this.parent = null;
            
            // Pour l'animation
            this.x = width / 2;
            this.y = 50;
            this.targetX = width / 2;
            this.targetY = 50;
        }
    }

    // Le nœud Sentinelle (NIL) utilisé dans les arbres rouge-noir
    const NIL = new Node(null);
    NIL.color = BLACK;

    class RedBlackTree {
        constructor() {
            this.root = NIL;
        }
    }

    let tree = new RedBlackTree();

    // --- Fonctions d'Animation & Rendu ---

    function resize() {
        width = window.innerWidth;
        height = window.innerHeight;
        canvas.width = width;
        canvas.height = height;
        updateLayout();
    }
    window.addEventListener('resize', resize);

    function addLog(message, type = 'info') {
        const div = document.createElement('div');
        div.className = 'log-entry';
        
        let colorClass = 'text-slate-300';
        if(type === 'red') colorClass = 'text-red-400 font-bold';
        if(type === 'black') colorClass = 'text-slate-400 font-bold';
        if(type === 'rotate') colorClass = 'text-emerald-400 font-bold';
        if(type === 'highlight') colorClass = 'text-blue-300';

        div.innerHTML = `<span class="text-slate-500 text-xs mr-2">>></span><span class="${colorClass}">${message}</span>`;
        logContainer.prepend(div); // Ajoute en haut (mais comme on est en flex-col-reverse, ça s'empile bien)
    }

    function getDelay() {
        // Vitesse de 1 (lent) à 10 (rapide)
        const speed = parseInt(sliderSpeed.value);
        return Math.max(50, 1500 - (speed * 140)); // de ~100ms à ~1400ms
    }

    const sleep = () => new Promise(resolve => setTimeout(resolve, getDelay()));

    // Calcule les positions cibles (targetX, targetY) de tous les nœuds
    function updateLayout() {
        if (tree.root === NIL) return;
        
        // Un parcours pour déterminer la profondeur max et allouer l'espace
        function computePositions(node, depth, minX, maxX) {
            if (node === NIL) return;
            
            node.targetY = 100 + depth * 80;
            node.targetX = (minX + maxX) / 2;
            
            computePositions(node.left, depth + 1, minX, node.targetX);
            computePositions(node.right, depth + 1, node.targetX, maxX);
        }

        // On laisse une marge sur les côtés pour éviter que les panneaux ne cachent l'arbre
        // Panneau gauche ~350px (on prend 400), Panneau droit ~320px (on prend width - 360)
        computePositions(tree.root, 0, 400, width - 360); 
    }

    // Boucle de rendu principal (60 FPS) indépendante de la logique
    function animateLoop() {
        ctx.clearRect(0, 0, width, height);

        // Dessiner les arêtes d'abord
        function drawEdges(node) {
            if (node === NIL) return;
            
            ctx.lineWidth = 2;
            ctx.strokeStyle = '#334155'; // Gris ardoise

            if (node.left !== NIL) {
                ctx.beginPath();
                ctx.moveTo(node.x, node.y);
                ctx.lineTo(node.left.x, node.left.y);
                ctx.stroke();
                drawEdges(node.left);
            }
            if (node.right !== NIL) {
                ctx.beginPath();
                ctx.moveTo(node.x, node.y);
                ctx.lineTo(node.right.x, node.right.y);
                ctx.stroke();
                drawEdges(node.right);
            }
        }
        drawEdges(tree.root);

        // Dessiner les nœuds ensuite
        function drawNodes(node) {
            if (node === NIL) return;

            // Interpolation (mouvement fluide)
            node.x += (node.targetX - node.x) * 0.1;
            node.y += (node.targetY - node.y) * 0.1;

            // Ombre / Lueur
            ctx.shadowBlur = 15;
            if (node === highlightedNode) {
                ctx.shadowColor = '#3b82f6'; // Lueur bleue si surligné
                ctx.shadowBlur = 25;
            } else if (node.color === RED) {
                ctx.shadowColor = 'rgba(239, 68, 68, 0.6)'; // Lueur rouge
            } else {
                ctx.shadowColor = 'rgba(0, 0, 0, 0.8)'; // Ombre noire
            }

            // Cercle du nœud
            ctx.beginPath();
            ctx.arc(node.x, node.y, 22, 0, Math.PI * 2);
            
            if (node.color === RED) {
                ctx.fillStyle = '#ef4444'; // bg-red-500
                ctx.strokeStyle = '#fca5a5'; // Bordure plus claire
            } else {
                ctx.fillStyle = '#1e293b'; // bg-slate-800
                ctx.strokeStyle = '#94a3b8'; // Bordure grise
            }
            
            ctx.fill();
            ctx.lineWidth = 2;
            ctx.stroke();
            
            ctx.shadowBlur = 0; // Reset shadow pour le texte

            // Texte de la valeur
            ctx.fillStyle = node.color === RED ? '#fff' : '#f8fafc';
            ctx.font = 'bold 16px Courier New';
            ctx.textAlign = 'center';
            ctx.textBaseline = 'middle';
            ctx.fillText(node.value, node.x, node.y);

            drawNodes(node.left);
            drawNodes(node.right);
        }
        drawNodes(tree.root);

        requestAnimationFrame(animateLoop);
    }

    // --- Logique Arbre Rouge-Noir (avec animations) ---

    async function leftRotate(x) {
        addLog(`Rotation gauche sur ${x.value}`, 'rotate');
        let y = x.right;
        x.right = y.left;
        if (y.left !== NIL) y.left.parent = x;
        y.parent = x.parent;
        if (x.parent === NIL) tree.root = y;
        else if (x === x.parent.left) x.parent.left = y;
        else x.parent.right = y;
        y.left = x;
        x.parent = y;
        
        updateLayout();
        await sleep();
    }

    async function rightRotate(y) {
        addLog(`Rotation droite sur ${y.value}`, 'rotate');
        let x = y.left;
        y.left = x.right;
        if (x.right !== NIL) x.right.parent = y;
        x.parent = y.parent;
        if (y.parent === NIL) tree.root = x;
        else if (y === y.parent.right) y.parent.right = x;
        else y.parent.left = x;
        x.right = y;
        y.parent = x;
        
        updateLayout();
        await sleep();
    }

    async function insertFixup(z) {
        while (z.parent.color === RED) {
            if (z.parent === z.parent.parent.left) {
                let y = z.parent.parent.right; // Oncle
                
                // Cas 1: L'oncle est rouge
                if (y.color === RED) {
                    addLog("Conflit 🔴-🔴 détecté.", 'red');
                    addLog(`Cas 1: L'oncle (${y.value}) est rouge.`, 'highlight');
                    await sleep();
                    
                    z.parent.color = BLACK;
                    y.color = BLACK;
                    z.parent.parent.color = RED;
                    addLog(`Recoloriage : Parent et Oncle en Noir, Grand-parent en Rouge.`);
                    
                    updateLayout();
                    await sleep();
                    z = z.parent.parent;
                } 
                // Cas 2 & 3: L'oncle est noir
                else {
                    // Cas 2: Triangle
                    if (z === z.parent.right) {
                        addLog(`Cas 2: Oncle noir, configuration en "Triangle".`, 'highlight');
                        await sleep();
                        z = z.parent;
                        await leftRotate(z);
                    }
                    // Cas 3: Ligne
                    addLog(`Cas 3: Oncle noir, configuration en "Ligne".`, 'highlight');
                    await sleep();
                    
                    z.parent.color = BLACK;
                    z.parent.parent.color = RED;
                    addLog(`Recoloriage : Parent en Noir, Grand-parent en Rouge.`);
                    updateLayout();
                    await sleep();
                    
                    await rightRotate(z.parent.parent);
                }
            } else {
                // Symétrique: Parent est l'enfant droit
                let y = z.parent.parent.left; // Oncle
                
                if (y.color === RED) {
                    addLog("Conflit 🔴-🔴 détecté.", 'red');
                    addLog(`Cas 1: L'oncle (${y.value}) est rouge.`, 'highlight');
                    await sleep();
                    
                    z.parent.color = BLACK;
                    y.color = BLACK;
                    z.parent.parent.color = RED;
                    addLog(`Recoloriage : Parent et Oncle en Noir, Grand-parent en Rouge.`);
                    
                    updateLayout();
                    await sleep();
                    z = z.parent.parent;
                } else {
                    if (z === z.parent.left) {
                        addLog(`Cas 2: Oncle noir, configuration en "Triangle".`, 'highlight');
                        await sleep();
                        z = z.parent;
                        await rightRotate(z);
                    }
                    addLog(`Cas 3: Oncle noir, configuration en "Ligne".`, 'highlight');
                    await sleep();
                    
                    z.parent.color = BLACK;
                    z.parent.parent.color = RED;
                    addLog(`Recoloriage : Parent en Noir, Grand-parent en Rouge.`);
                    updateLayout();
                    await sleep();
                    
                    await leftRotate(z.parent.parent);
                }
            }
        }
        
        if (tree.root.color === RED) {
            tree.root.color = BLACK;
            addLog(`Propriété 2: La racine devient Noire.`, 'black');
            updateLayout();
            await sleep();
        }
    }

    async function rbInsert(val) {
        if (isAnimating) return;
        isAnimating = true;
        setButtonsState(true);

        logContainer.innerHTML = ''; // Clear logs for new insertion
        addLog(`=== Insertion de ${val} ===`);

        let z = new Node(val);
        z.left = NIL;
        z.right = NIL;

        let y = NIL;
        let x = tree.root;

        // Parcours façon ABR standard avec surbrillance
        while (x !== NIL) {
            y = x;
            highlightedNode = x;
            addLog(`Comparaison avec ${x.value}...`);
            await sleep();
            
            if (z.value === x.value) {
                addLog(`La valeur ${val} existe déjà ! Insertion annulée.`, 'red');
                highlightedNode = null;
                isAnimating = false;
                setButtonsState(false);
                return;
            }

            if (z.value < x.value) {
                x = x.left;
                addLog(`Plus petit, on va à gauche.`);
            } else {
                x = x.right;
                addLog(`Plus grand, on va à droite.`);
            }
        }
        
        highlightedNode = null;
        z.parent = y;
        
        // Configuration initiale pour l'animation d'apparition
        if (y !== NIL) {
            z.x = y.x;
            z.y = y.y;
        } else {
            z.x = width / 2;
            z.y = -50; // Descend du ciel si racine
        }

        if (y === NIL) {
            tree.root = z;
        } else if (z.value < y.value) {
            y.left = z;
        } else {
            y.right = z;
        }

        addLog(`Nœud ${val} attaché en Rouge.`, 'red');
        updateLayout();
        await sleep();

        await insertFixup(z);

        addLog(`=== Insertion terminée ===`, 'highlight');
        isAnimating = false;
        setButtonsState(false);
    }

    // --- Contrôles UI ---

    function setButtonsState(disabled) {
        btnInsert.disabled = disabled;
        btnRandom.disabled = disabled;
        inputVal.disabled = disabled;
        if(disabled) {
            btnInsert.classList.add('opacity-50', 'cursor-not-allowed');
            btnRandom.classList.add('opacity-50', 'cursor-not-allowed');
        } else {
            btnInsert.classList.remove('opacity-50', 'cursor-not-allowed');
            btnRandom.classList.remove('opacity-50', 'cursor-not-allowed');
            inputVal.focus();
        }
    }

    function insertManual() {
        const val = parseInt(inputVal.value);
        if (!isNaN(val)) {
            rbInsert(val);
            inputVal.value = '';
        }
    }

    function insertRandom() {
        const val = Math.floor(Math.random() * 99) + 1; // 1 à 99
        rbInsert(val);
    }

    function resetTree() {
        if(isAnimating) return;
        tree.root = NIL;
        logContainer.innerHTML = '';
        addLog("Arbre réinitialisé.");
        ctx.clearRect(0, 0, width, height);
    }

    // Démarrage
    resize();
    animateLoop();

    // Insertion automatique d'un premier nœud pour montrer l'exemple
    setTimeout(() => {
        if(tree.root === NIL && !isAnimating) {
            rbInsert(42);
        }
    }, 500);

</script>
</body>
</html>
